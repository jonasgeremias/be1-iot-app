<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;align-items:flex-end;justify-content:space-around;gap:2px;padding:9px 12px 14px;background:var(--surface);border-top:1px solid var(--border);">
  <div style="{{ item0 }}">
    <div style="{{ chip0 }}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M15.6 5.3a3.6 3.6 0 0 0-4.9 4.9l-6.4 6.4a1.5 1.5 0 0 0 0 2.1l.9.9a1.5 1.5 0 0 0 2.1 0l6.4-6.4a3.6 3.6 0 0 0 4.9-4.9l-2.3 2.3-2.2-.6-.6-2.2z"/></svg></div>
    <span style="font-size:9.5px;font-weight:600;white-space:nowrap;">Assistências</span>
  </div>
  <div style="{{ item1 }}">
    <div style="{{ chip1 }}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.2 12 3l9 7.2"/><path d="M5.5 9.3V20a1 1 0 0 0 1 1H10v-5.5h4V21h3.5a1 1 0 0 0 1-1V9.3"/></svg></div>
    <span style="font-size:9.5px;font-weight:700;white-space:nowrap;">Início</span>
  </div>
  <div style="{{ item2 }}">
    <div style="{{ chip2 }}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="12" rx="2"/><path d="M9 20.5h6M12 16.5v4"/></svg></div>
    <span style="font-size:9.5px;font-weight:600;white-space:nowrap;">Monitoramento</span>
  </div>
  <div style="{{ item3 }}">
    <div style="{{ chip3 }}"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8.2" r="3.3"/><path d="M5.8 19.6c.5-3.2 3.1-5.2 6.2-5.2s5.7 2 6.2 5.2"/></svg></div>
    <span style="font-size:9.5px;font-weight:600;white-space:nowrap;">Perfil</span>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:370,&quot;height&quot;:76},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;assist&quot;,&quot;inicio&quot;,&quot;monit&quot;,&quot;perfil&quot;],&quot;default&quot;:&quot;inicio&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const A = this.props.active || 'inicio';
    const on = k => k === A;
    const item = k => ({ display:'flex', flexDirection:'column', alignItems:'center', gap:4, flex:1, minWidth:0, color: on(k) ? 'var(--brand)' : 'var(--text-3)' });
    const chip = k => ({ width:46, height:28, borderRadius:11, display:'flex', alignItems:'center', justifyContent:'center', background: on(k) ? 'var(--brand-soft)' : 'transparent', transition:'background .2s' });
    return {
      item0:item('assist'), item1:item('inicio'), item2:item('monit'), item3:item('perfil'),
      chip0:chip('assist'), chip1:chip('inicio'), chip2:chip('monit'), chip3:chip('perfil')
    };
  }
}
</script>
</body>
</html>
